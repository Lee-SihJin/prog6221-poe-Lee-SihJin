name: Build Project

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Restore dependencies
      run: dotnet restore CybersecurityChatbot/CybersecurityChatbot/CybersecurityChatbot.csproj
    
    - name: Build
      run: dotnet build CybersecurityChatbot/CybersecurityChatbot/CybersecurityChatbot.csproj --configuration Release --no-restore
    
    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal
      continue-on-error: true
